<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, height=630, initial-scale=1.0" />
    <title>DevAI OG Image Preview</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap");

      body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        background-color: #0a0a0a;
        font-family: "Inter", sans-serif;
        color: #ffffff;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box;
        padding: 80px 100px;
      }

      /* Subtle purple glow */
      .glow {
        position: absolute;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, rgba(10, 10, 10, 0) 70%);
        top: -200px;
        right: -200px;
        border-radius: 50%;
        z-index: 0;
      }

      .glow-2 {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(10, 10, 10, 0) 70%);
        bottom: -100px;
        left: -100px;
        border-radius: 50%;
        z-index: 0;
      }

      .content {
        position: relative;
        z-index: 10;
      }

      .logo {
        font-size: 110px;
        font-weight: 900;
        letter-spacing: -3px;
        margin: 0;
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #e879f9 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
      }

      .tagline {
        font-size: 42px;
        font-weight: 600;
        color: #e5e5e5;
        margin-top: 10px;
        margin-bottom: 60px;
        letter-spacing: -0.5px;
      }

      .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px 40px;
        font-size: 28px;
        font-weight: 600;
        color: #a3a3a3;
      }

      .feature-item {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .icon-wrapper {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-wrapper svg {
        width: 24px;
        height: 24px;
        color: #818cf8;
      }

      .footer {
        position: absolute;
        bottom: 60px;
        right: 100px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 22px;
        font-weight: 600;
        color: #737373;
        z-index: 10;
      }

      .footer svg {
        width: 28px;
        height: 28px;
        color: #e5e5e5;
      }

      /* Custom UI Accents */
      .grid-bg {
        position: absolute;
        inset: 0;
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="glow-2"></div>
    <div class="grid-bg"></div>

    <div class="content">
      <h1 class="logo">DevAI</h1>
      <h2 class="tagline">AI-Powered Developer Career Platform</h2>

      <div class="features">
        <div class="feature-item">
          <div class="icon-wrapper">
            <svg
              xmlns="http://www.w3.org/-svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
              />
              <path d="M9 18c-4.51 2-5-2-7-2" />
            </svg>
          </div>
          <span>GitHub Analyzer</span>
        </div>

        <div class="feature-item">
          <div class="icon-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" x2="8" y1="13" y2="13" />
              <line x1="16" x2="8" y1="17" y2="17" />
              <line x1="10" x2="8" y1="9" y2="9" />
            </svg>
          </div>
          <span>Resume Builder</span>
        </div>

        <div class="feature-item">
          <div class="icon-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="2" x2="22" y1="12" y2="12" />
              <path
                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
              />
            </svg>
          </div>
          <span>Portfolio Deploy</span>
        </div>

        <div class="feature-item">
          <div class="icon-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" x2="12" y1="19" y2="22" />
            </svg>
          </div>
          <span>Mock Interviews</span>
        </div>

        <div class="feature-item">
          <div class="icon-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 8V4H8" />
              <rect width="16" height="12" x="4" y="8" rx="2" />
              <path d="M2 14h2" />
              <path d="M20 14h2" />
              <path d="M15 13v2" />
              <path d="M9 13v2" />
            </svg>
          </div>
          <span>AI Copilot</span>
        </div>

        <div class="feature-item">
          <div class="icon-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          </div>
          <span>Career Roadmap</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
        <path d="m9 12 2 2 4-4" />
      </svg>
      Built with Gemini + Groq AI
    </div>
  </body>
</html>

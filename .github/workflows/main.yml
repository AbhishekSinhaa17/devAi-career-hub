name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build Validation
        run: npm run build
        env:
          # Dummy values to allow build to pass if variables are evaluated during build time
          VITE_SUPABASE_URL: "https://dummy.supabase.co"
          VITE_SUPABASE_ANON_KEY: "dummy-key"
          SUPABASE_SERVICE_ROLE_KEY: "dummy-service-key"
          GEMINI_API_KEY: "dummy-gemini"
          GROQ_API_KEY: "dummy-groq"
